# Nginx configuration for ai.wiratek.id
# Cloudflare Full SSL Mode
# - SSL between Cloudflare edge <-> this server (self-signed cert OK)
# - Set Cloudflare SSL/TLS mode to "Full" (not "Full Strict")
#
# Setup:
#   1. Generate self-signed cert:
#      openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#        -keyout /etc/ssl/private/ai.wiratek.id.key \
#        -out /etc/ssl/certs/ai.wiratek.id.crt \
#        -subj "/CN=ai.wiratek.id"
#   2. Copy this file to /etc/nginx/sites-available/ai.wiratek.id
#   3. ln -s /etc/nginx/sites-available/ai.wiratek.id /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name ai.wiratek.id;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name ai.wiratek.id;

    # Self-signed certificate (Cloudflare Full mode accepts this)
    ssl_certificate     /etc/ssl/certs/ai.wiratek.id.crt;
    ssl_certificate_key /etc/ssl/private/ai.wiratek.id.key;

    # SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Logging
    access_log /var/log/nginx/ai.wiratek.id.access.log;
    error_log  /var/log/nginx/ai.wiratek.id.error.log;

    # Max upload size
    client_max_body_size 200M;

    # Restore real visitor IP from Cloudflare
    real_ip_header     CF-Connecting-IP;
    # Cloudflare IPv4 ranges
    set_real_ip_from   103.21.244.0/22;
    set_real_ip_from   103.22.200.0/22;
    set_real_ip_from   103.31.4.0/22;
    set_real_ip_from   104.16.0.0/13;
    set_real_ip_from   104.24.0.0/14;
    set_real_ip_from   108.162.192.0/18;
    set_real_ip_from   131.0.72.0/22;
    set_real_ip_from   141.101.64.0/18;
    set_real_ip_from   162.158.0.0/15;
    set_real_ip_from   172.64.0.0/13;
    set_real_ip_from   173.245.48.0/20;
    set_real_ip_from   188.114.96.0/20;
    set_real_ip_from   190.93.240.0/20;
    set_real_ip_from   197.234.240.0/22;
    set_real_ip_from   198.41.128.0/17;
    # Cloudflare IPv6
    set_real_ip_from   2400:cb00::/32;
    set_real_ip_from   2606:4700::/32;
    set_real_ip_from   2803:f800::/32;
    set_real_ip_from   2405:b500::/32;
    set_real_ip_from   2405:8100::/32;
    set_real_ip_from   2a06:98c0::/29;
    set_real_ip_from   2c0f:f248::/32;

    # Frontend (Python stack - port 3081)
    location / {
        proxy_pass http://127.0.0.1:3081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (Python stack - port 8031)
    location /api/ {
        proxy_pass http://127.0.0.1:8031/api/;
        proxy_http_version 1.1;
        client_max_body_size 200M;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Rewrite http -> https in redirect Location headers (fixes mixed-content on 307)
        proxy_redirect http://ai.wiratek.id https://ai.wiratek.id;
        proxy_redirect http:// https://;

        # Disable buffering untuk SSE / streaming responses
        proxy_buffering off;
        proxy_cache off;

        # Timeout untuk streaming / long-running requests
        proxy_read_timeout    300s;
        proxy_connect_timeout  75s;
        proxy_send_timeout    300s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8031/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Docs (FastAPI Swagger)
    location /docs {
        proxy_pass http://127.0.0.1:8031/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
