# Backend API proxy configuration
# Placeholder for domain - edit this manually on VPS

server {
    listen 80;
    server_name _;  # Catch-all (replace with your domain)

    # Backend API proxy
    location /api/ {
        proxy_pass http://backend-python:8080/api/;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_cache off;

        proxy_read_timeout      300s;
        proxy_connect_timeout   75s;
        proxy_send_timeout      300s;
    }

    # Health check endpoint (optional)
    location /api/health {
        access_log off;
        proxy_pass http://backend-python:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend-python:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }
}