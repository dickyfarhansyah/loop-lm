# Backend API proxy configuration
# Placeholder for domain - edit this manually on VPS

server {
    listen 80;
    server_name demo-looplm.aether-ai.co;

    location /.well-known/acme-challenge {
        root /var/www/cerbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name demo-looplm.aether-ai.co;


    ssl_certificate /etc/letsencrypt/live/demo-looplm.aether-ai.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo-looplm.aether-ai.co/privkey.pem;


    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;


    # Backend API proxy
    location /api/ {
        proxy_pass http://backend-python:8080/api/;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_cache off;

        proxy_read_timeout      300s;
        proxy_connect_timeout   75s;
        proxy_send_timeout      300s;
    }

    # Health check endpoint (optional)
    location /api/health {
        access_log off;
        proxy_pass http://backend-python:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend-python:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }
}